<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Історія</title>
  <meta name="theme-color" content="#45d19e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shifter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111216'/%3E%3Cpath d='M32 14v18l11 11' fill='none' stroke='%2345d19e' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23f4f6f8' stroke-width='4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <p class="eyebrow">Записи змін</p>
      <h1>Історія</h1>
    </header>

    <section class="panel calendar-panel">
      <div class="calendar-header">
        <button class="calendar-nav" id="prevMonthBtn" type="button" aria-label="Попередній місяць">‹</button>
        <h2 id="calendarTitle">Місяць</h2>
        <button class="calendar-nav" id="nextMonthBtn" type="button" aria-label="Наступний місяць">›</button>
      </div>
      <div class="calendar-weekdays" aria-hidden="true">
        <span>Пн</span>
        <span>Вт</span>
        <span>Ср</span>
        <span>Чт</span>
        <span>Пт</span>
        <span>Сб</span>
        <span>Нд</span>
      </div>
      <div class="calendar-grid" id="calendarGrid" aria-label="Календар"></div>
      <div class="calendar-actions">
        <button class="clear" id="todayBtn" type="button">Сьогодні</button>
        <button class="clear" id="showAllBtn" type="button">Усі записи</button>
      </div>
      <div class="filter-actions" id="historyFilters" aria-label="Фільтри історії">
        <button class="filter-chip active" type="button" data-filter="all">Усі</button>
        <button class="filter-chip" type="button" data-filter="shift-1">1 зміна</button>
        <button class="filter-chip" type="button" data-filter="shift-2">2 зміна</button>
        <button class="filter-chip" type="button" data-filter="off">Поза графіком</button>
        <button class="filter-chip" type="button" data-filter="x15">x1.5</button>
        <button class="filter-chip" type="button" data-filter="x2">x2</button>
        <button class="filter-chip" type="button" data-filter="week">Цей тиждень</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2 id="historyTitle">Усі зміни</h2>
        <div class="section-actions">
          <button class="clear save-action" id="addShiftBtn" type="button">Додати</button>
          <button class="clear" id="clearHistoryBtn" type="button">Очистити</button>
        </div>
      </div>
      <ul class="history" id="history"></ul>
      <p class="empty" id="emptyHistory">Історія порожня.</p>
    </section>
  </main>

  <div id="bottomNav"></div>

  <script src="app.js?v=9"></script>
</body>
</html>
