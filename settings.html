<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Налаштування</title>
  <meta name="theme-color" content="#45d19e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shifter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111216'/%3E%3Cpath d='M32 14v18l11 11' fill='none' stroke='%2345d19e' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23f4f6f8' stroke-width='4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <p class="eyebrow">Дані працівника</p>
      <h1>Налаштування</h1>
    </header>

    <section class="panel settings">
      <label>
        Прізвище
        <input id="surnameInput" type="text" autocomplete="family-name" placeholder="Прізвище">
      </label>
      <label>
        Базова ставка, грн/год
        <input id="rateInput" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
      </label>
      <label>
        Затримка початку, с
        <input id="startHoldInput" type="number" min="1" max="10" step="1" inputmode="numeric" placeholder="3">
      </label>
      <label>
        Затримка виходу, с
        <input id="endHoldInput" type="number" min="1" max="10" step="1" inputmode="numeric" placeholder="5">
      </label>
      <div class="break-editor">
        <div class="break-editor-header">
          <strong>Перерви</strong>
          <button class="small-action" id="addBreakBtn" type="button">Додати перерву</button>
        </div>
        <div class="break-list" id="breakList"></div>
      </div>
      <div class="data-tools">
        <strong>Дані</strong>
        <div class="calendar-actions">
          <button class="clear" id="exportDataBtn" type="button">Експорт JSON</button>
          <button class="clear" id="importDataBtn" type="button">Імпорт JSON</button>
        </div>
        <input id="importDataInput" type="file" accept="application/json,.json" hidden>
      </div>
      <p class="saved" id="settingsSaved">Збережено автоматично</p>
    </section>
  </main>

  <div id="bottomNav"></div>

  <script src="app.js"></script>
</body>
</html>
