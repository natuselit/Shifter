<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аналітика</title>
  <meta name="theme-color" content="#45d19e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shifter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111216'/%3E%3Cpath d='M32 14v18l11 11' fill='none' stroke='%2345d19e' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23f4f6f8' stroke-width='4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <p class="eyebrow">Огляд змін</p>
      <h1>Аналітика</h1>
    </header>

    <section class="panel calendar-panel">
      <div class="calendar-header">
        <button class="calendar-nav" id="analyticsPrevMonthBtn" type="button" aria-label="Попередній місяць">‹</button>
        <h2 id="analyticsMonthTitle">Місяць</h2>
        <button class="calendar-nav" id="analyticsNextMonthBtn" type="button" aria-label="Наступний місяць">›</button>
      </div>
      <div class="calendar-weekdays" aria-hidden="true">
        <span>Пн</span>
        <span>Вт</span>
        <span>Ср</span>
        <span>Чт</span>
        <span>Пт</span>
        <span>Сб</span>
        <span>Нд</span>
      </div>
      <div class="calendar-grid" id="analyticsCalendarGrid" aria-label="Календар аналітики"></div>
      <div class="calendar-actions calendar-actions-three">
        <button class="clear" id="analyticsTodayBtn" type="button">Сьогодні</button>
        <button class="clear" id="analyticsMonthBtn" type="button">Місяць</button>
        <button class="clear" id="analyticsResetRangeBtn" type="button">Скинути</button>
      </div>
    </section>

    <section class="panel analytics-summary" aria-label="Підсумки місяця">
      <div class="metric">
        <span>Сума</span>
        <strong id="analyticsTotalPay">0,00 грн</strong>
      </div>
      <div class="metric">
        <span>Години</span>
        <strong id="analyticsTotalHours">00:00</strong>
      </div>
      <div class="metric">
        <span>Зміни</span>
        <strong id="analyticsShiftCount">0</strong>
      </div>
      <div class="metric">
        <span>Середня</span>
        <strong id="analyticsAveragePay">0,00 грн</strong>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Дні</h2>
      </div>
      <div class="analytics-chart" id="analyticsChart" aria-label="Графік по днях"></div>
      <p class="empty" id="analyticsEmpty">За цей місяць записів немає.</p>
    </section>

    <section class="panel analytics-lists">
      <div>
        <h2>Типи змін</h2>
        <ul class="analytics-list" id="analyticsShiftTypes"></ul>
      </div>
      <div>
        <h2>Коефіцієнти</h2>
        <ul class="analytics-list" id="analyticsMultipliers"></ul>
      </div>
      <div>
        <h2>Найкращі дні</h2>
        <ul class="analytics-list" id="analyticsTopDays"></ul>
      </div>
    </section>
  </main>

  <div id="bottomNav"></div>

  <script src="app.js?v=9"></script>
</body>
</html>
